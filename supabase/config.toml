project_id = "yamato-vikings-hub"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173", "https://yasuda-dk.github.io/yamato-vikings-hub/"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.setup-team-password]
verify_jwt = false
